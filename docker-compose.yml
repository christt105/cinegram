  #   volumes:
  #     - C:\Users\chris\Desktop\Projects\jellygram\appdata/bot:/data
  
  bot-net:
    build:
      context: ./bot-net
      dockerfile: Dockerfile
    container_name: bot-net
    user: "${PUID:-1000}:${PGID:-1000}"
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8088:8080"
    volumes:
      - ./appdata/bot-net:/data
      # Import & Download directories (writeable for downloading)
      - ${IMPORT_MOVIES_DIR:-/mnt/disco/70-79_Media/Peliculas}:/data/import/movies
      - ${IMPORT_SHOWS_DIR:-/mnt/disco/70-79_Media/Series}:/data/import/shows
    environment:
      - JELLYFIN_MOVIES_DIR=/data/import/movies
      - JELLYFIN_SHOWS_DIR=/data/import/shows
  
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    user: "${PUID:-1000}:${PGID:-1000}"
    env_file:
      - .env
    volumes:
      - ./appdata/backend:/data
    ports:
      - "${BACKEND_PORT:-8005}:8000"
    restart: unless-stopped

  web:
    build:
      context: ./web
      dockerfile: Dockerfile.dev
    container_name: cinegram-web
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      - VITE_JELLYFIN_URL=${JELLYFIN_URL:-http://192.168.1.15:8096}
      - VITE_JELLYFIN_TOKEN=${JELLYFIN_TOKEN:-}
